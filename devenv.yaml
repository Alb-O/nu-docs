inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  poly-docs-env:
    url: github:Alb-O/poly-docs-env
    flake: false
  poly-bootstrap:
    url: github:Alb-O/poly-bootstrap
    flake: false
imports:
  - poly-docs-env
  - poly-bootstrap
